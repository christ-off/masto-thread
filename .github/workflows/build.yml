name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Inject secrets into instapaper.js
        run: |
          sed -i "s|'YOUR_CONSUMER_KEY'|'${{ secrets.INSTAPAPER_CONSUMER_KEY }}'|g" instapaper.js
          sed -i "s|'YOUR_CONSUMER_SECRET'|'${{ secrets.INSTAPAPER_CONSUMER_SECRET }}'|g" instapaper.js

      - name: Build extension
        run: |
          npx web-ext build \
            --source-dir . \
            --artifacts-dir web-ext-artifacts \
            --ignore-files '**/*.test.js' 'package.json' 'package-lock.json' 'vitest.config.js' 'sonar-project.properties' 'README.md' 'screenshots/**' 'coverage/**' 'lcov.info'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mastodon-thread-reader
          path: web-ext-artifacts/*.zip
