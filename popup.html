<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mastodon Thread Reader</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      color: #1a1a18;
      width: 340px;
      padding: 16px;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1e1e1c; color: #f0ede8; }
      input { background: #2a2a28; color: #f0ede8; border-color: rgba(255,255,255,0.15); }
      input:focus { border-color: rgba(255,255,255,0.3); }
      .btn-primary { background: #6364FF; }
      .btn-primary:hover { background: #7475ff; }
      .note { color: #888780; }
      .detected-badge { background: #042c53; color: #85b7eb; }
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    header img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    header h1 {
      font-size: 14px;
      font-weight: 500;
    }

    .detected-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      background: #e6f1fb;
      color: #185fa5;
      margin-bottom: 10px;
      display: none;
      align-items: center;
      gap: 5px;
    }

    .detected-badge.visible { display: flex; }

    label {
      font-size: 12px;
      color: #5f5e5a;
      display: block;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      font-family: inherit;
      font-size: 12px;
      padding: 7px 10px;
      border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 6px;
      outline: none;
      margin-bottom: 10px;
    }

    input:focus { border-color: rgba(0,0,0,0.4); }

    .btn-primary {
      width: 100%;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #6364FF;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary:hover { background: #5253e0; }
    .btn-primary:active { transform: scale(0.98); }

    .note {
      font-size: 11px;
      color: #888780;
      margin-top: 10px;
      text-align: center;
    }

    #error {
      font-size: 12px;
      color: #a32d2d;
      background: #fcebeb;
      border-radius: 6px;
      padding: 7px 10px;
      margin-bottom: 10px;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon-48.svg" alt="" />
    <h1>Mastodon Thread Reader</h1>
  </header>

  <div class="detected-badge" id="detected-badge">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
    Mastodon post detected
  </div>

  <div id="error"></div>

  <label for="url-input">Post URL</label>
  <input id="url-input" type="text" placeholder="https://mastodon.social/@user/123…" />

  <button class="btn-primary" id="open-btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    Open as readable thread
  </button>

  <p class="note">Opens in a new tab</p>

  <script type="module" src="popup.js"></script>
</body>
</html>
