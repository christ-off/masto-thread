<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mastodon Thread Reader — Options</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           max-width: 400px; margin: 2rem auto; padding: 0 1rem; color: #1a1a18; }
    @media (prefers-color-scheme: dark) { body { background: #1e1e1c; color: #f0ede8; }
      input { background: #2a2a28; color: #f0ede8; border-color: rgba(255,255,255,0.2); } }
    h1 { font-size: 16px; margin-bottom: 1.5rem; }
    label { display: block; font-size: 12px; color: #5f5e5a; margin-bottom: 4px; }
    input { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 0.5px solid rgba(0,0,0,0.2);
            border-radius: 6px; font-family: inherit; font-size: 13px; margin-bottom: 12px; outline: none; }
    button { width: 100%; padding: 9px; border: none; border-radius: 6px; background: #6364FF;
             color: white; font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; }
    button:hover { background: #5253e0; }
    #status { font-size: 12px; margin-top: 10px; min-height: 16px; }
    .ok { color: #2e7d32; } .err { color: #a32d2d; }
    .connected { font-size: 13px; margin-bottom: 1rem; padding: 8px 12px;
                 background: #e6f1fb; border-radius: 6px; color: #185fa5; }
    @media (prefers-color-scheme: dark) { .connected { background: #042c53; color: #85b7eb; } }
  </style>
</head>
<body>
  <h1>Instapaper Settings</h1>
  <div id="connected-info" style="display:none" class="connected"></div>
  <label for="email">Email or username</label>
  <input id="email" type="email" placeholder="you@example.com" />
  <label for="password">Password, if you have one</label>
  <input id="password" type="password" placeholder="(leave blank if none)" />
  <button id="save-btn">Connect to Instapaper</button>
  <div id="status"></div>
  <script type="module" src="options.js"></script>
</body>
</html>
